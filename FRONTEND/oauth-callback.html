<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DTube - Securing Session</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #0f0f11;
			color: white;
			margin: 0;
		}

		.loader-container {
			text-align: center;
		}

		.spinner {
			border: 4px solid rgba(255, 255, 255, 0.1);
			width: 50px;
			height: 50px;
			border-radius: 50%;
			border-left-color: #ff0000;
			animation: spin 1s linear infinite;
			margin: 0 auto 20px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<div class="loader-container">
		<div class="spinner"></div>
		<h2>Syncing your account details...</h2>
	</div>

	<script>
		
		const urlParams = new URLSearchParams(window.location.search);
		const accessToken = urlParams.get('accessToken');

		if (accessToken) {
			
			localStorage.setItem('accessToken', accessToken);
			console.log("🔒 Handshake successful! Redirecting to dashboard...");

			
			setTimeout(() => {
				window.location.href = '/index.html';
			}, 1000);
		} else {
			document.body.innerHTML = `
                <div class="loader-container">
                    <h2 style="color: #ff3333;">Authentication Token Missing</h2>
                    <p>Please try logging in again via <a href="/login.html" style="color: #fff; text-decoration: underline;">Login Page</a>.</p>
                </div>
            `;
		}
	</script>
</body>

</html>
