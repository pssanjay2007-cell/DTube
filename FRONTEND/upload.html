<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF8">
		<meta name="viewport" content="width=device-width,initial-scale=1.0">
		<title>DTube - Upload</title>
		<link rel="stylesheet" href="/css/index.css">
		<link rel="stylesheet" href="/css/upload.css">
	</head>
	<body>
		<header class="nav-bar">
			<div class="nav-left">
				<div class="logo" style="cursor:pointer" onclick="window.location.href='/index.html'">
					D<span class="highlight-by-red">Tube</span>
				</div>
			</div>
			<div class="nav-mid"></div>
			<div class="nav-right">
				<button id="btn-profile" class="profile-btn">Profile</button>
				<button id="btn-logout" class="logout-btn">Sign Out</button>
			</div>
		</header>
		<div class="main-container">
			<aside class="sidebar">
				<nav class="sidebar-menu">
					<button id="menu-feed" class="menu-item">Your Feed</button>
					<button id="menu-studio" class="menu-item active">Upload Studio</button>
				</nav>
			</aside>
			<main class="content-feed">
				<div class="upload-area">
					<h2 style="margin-bottom: 6px">Upload Video</h2>
					<p style="color: #a0a0ab; margin-bottom: 24px; font-size: 14px;">Publish MP4 streams to your channel.</p>

					<form id="upload-form">
						<div class="form-group">
							<label for="video-title">Title (required)</label>
							<input id="video-title" type="text" required placeholder="Add a title for your video">
						</div>
						<div class="form-group">
							<label for="video-desc">Description</label>
							<textarea id="video-desc" type="text" placeholder="Add your video description"></textarea>
						</div>
						<div class="form-group">
							<label>Video File</label>
							<div class="file-dropzone">
								<input type="file" id="video-file" accept="video/mp4,video/mkv,video/mov" required>
								<p style="color: #a0a0ab; font-size: 13px; margin-top: 8px;">Supports MP4, MKV, or MOV formats</p>
							</div>
						</div>
						<button type="submit" id="publish-btn"  class="btn-publish">Upload Video</button>
					</form>
					<div class="status-indicator" id="upload-status"></div>
				</div>
			</main>
		</div>
		<script src="/scripts/auth.js"></script>
		<script src="/scripts/upload.js"></script>
	</body>

</html>
